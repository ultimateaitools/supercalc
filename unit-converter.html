      <!-- Category tabs -->
      <div class="category-pills mb-4" style="flex-wrap:wrap">

        <button class="cat-pill" onclick="setCategory('weight',this)">⚖️ Weight</button>
        <button class="cat-pill" onclick="setCategory('temperature',this)">🌡️ Temperature</button>
        <button class="cat-pill" onclick="setCategory('area',this)">📐 Area</button>
        <button class="cat-pill" onclick="setCategory('volume',this)">🧪 Volume</button>
        <button class="cat-pill" onclick="setCategory('speed',this)">⚡ Speed</button>
        <button class="cat-pill" onclick="setCategory('time',this)">⏱️ Time</button>
        <button class="cat-pill" onclick="setCategory('pressure',this)">🔵 Pressure</button>
        <button class="cat-pill" onclick="setCategory('energy',this)">⚡ Energy</button>
        <button class="cat-pill" onclick="setCategory('data',this)">💾 Data</button>
      </div>

      <div class="calc-box">
        <div class="row g-3 align-items-end">
          <div class="col-md-4"><label class="form-label">Value</label><input type="number" class="form-control" id="fromVal" value="1" step="any" oninput="convert()"></div>
          <div class="col-md-4"><label class="form-label">From</label><select class="form-select" id="fromUnit" onchange="convert()"></select></div>
          <div class="col-md-4"><label class="form-label">To</label><select class="form-select" id="toUnit" onchange="convert()"></select></div>
        </div>

          <div class="action-btns mt-3"><button class="btn-action" onclick="swapUnits()"><i class="bi bi-arrow-left-right"></i> Swap</button><button class="btn-action" onclick="copyResult(document.getElementById('result').textContent)"><i class="bi bi-clipboard"></i> Copy</button></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script>
const categories = {
  length: {
    label:'Length',
    units: {meter:1, kilometer:1000, centimeter:0.01, millimeter:0.001, mile:1609.344, yard:0.9144, foot:0.3048, inch:0.0254, 'nautical mile':1852, 'light year':9.461e15, angstrom:1e-10},
    popular:[['1 km','0.621 miles'],['1 inch','2.54 cm'],['1 foot','30.48 cm'],['1 mile','1.609 km'],['1 meter','3.281 feet']]
  },
  weight: {
    label:'Weight/Mass',
    units: {kilogram:1, gram:0.001, milligram:0.000001, 'metric ton':1000, pound:0.453592, ounce:0.0283495, tonne:1000, stone:6.35029, carat:0.0002},
    popular:[['1 kg','2.205 lbs'],['1 lb','0.4536 kg'],['1 ton','1000 kg'],['100 g','3.527 oz']]
  },
  temperature: {label:'Temperature', units: {Celsius:1, Fahrenheit:1, Kelvin:1, Rankine:1}},
  area: {
    label:'Area',
    units: {'sq meter':1, 'sq kilometer':1e6, 'sq centimeter':0.0001, 'sq foot':0.092903, 'sq inch':0.00064516, 'sq mile':2589988, hectare:10000, acre:4046.86},
    popular:[['1 hectare','2.471 acres'],['1 sq mile','640 acres'],['1 acre','4047 sq m']]
  },
  volume: {
    label:'Volume',
    units: {liter:1, milliliter:0.001, 'cubic meter':1000, 'cubic centimeter':0.001, gallon:3.78541, quart:0.946353, pint:0.473176, cup:0.236588, 'fluid ounce':0.0295735, 'cubic foot':28.3168, 'cubic inch':0.0163871},
    popular:[['1 gallon','3.785 L'],['1 cup','236.6 mL'],['1 liter','1000 mL']]
  },
  speed: {
    label:'Speed',
    units: {'km/h':1, 'm/s':3.6, 'mph':1.60934, knot:1.852, 'ft/s':1.09728, 'mach (sea level)':1234.8},
    popular:[['100 km/h','62.1 mph'],['1 m/s','3.6 km/h'],['1 knot','1.852 km/h']]
  },
  time: {
    label:'Time',
    units: {second:1, minute:60, hour:3600, day:86400, week:604800, month:2629746, year:31556952, millisecond:0.001, microsecond:0.000001},
    popular:[['1 day','86,400 s'],['1 year','365 days'],['1 hour','3600 s']]
  },
  pressure: {
    label:'Pressure',
    units: {pascal:1, kilopascal:1000, megapascal:1e6, bar:100000, psi:6894.76, atm:101325, torr:133.322, 'mm Hg':133.322},
    popular:[['1 atm','101.325 kPa'],['1 bar','14.504 psi'],['1 psi','6.895 kPa']]
  },
  energy: {
    label:'Energy',
    units: {joule:1, kilojoule:1000, megajoule:1e6, calorie:4.18400, kilocalorie:4184, 'watt-hour':3600, 'kilowatt-hour':3600000, BTU:1055.06, electronvolt:1.602e-19},
    popular:[['1 kWh','3,600,000 J'],['1 kcal','4,184 J'],['1 BTU','1,055 J']]
  },
  data: {
    label:'Digital Data',
    units: {bit:1, byte:8, kilobyte:8192, megabyte:8388608, gigabyte:8589934592, terabyte:8796093022208, petabyte:8.796e15, kibibyte:8192, mebibyte:8388608, gibibyte:8589934592},
    popular:[['1 GB','1,073 MB'],['1 TB','1,024 GB'],['1 byte','8 bits']]
  }
};

let currentCat='length';
function setCategory(cat, btn){
  currentCat=cat;
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'));if(btn)btn.classList.add('active');
  const c=categories[cat];
  const units=Object.keys(c.units);
  const fromSel=document.getElementById('fromUnit'),toSel=document.getElementById('toUnit');
  fromSel.innerHTML=units.map(u=>`<option value="${u}">${u}</option>`).join('');
  toSel.innerHTML=units.map((u,i)=>`<option value="${u}"${i===1?' selected':''}>${u}</option>`).join('');
  document.getElementById('resultLabel').textContent=c.label+' Conversion';
  if(c.popular){
    document.getElementById('quickRef').innerHTML=`<h4 style="font-size:0.88rem;font-weight:700;margin-bottom:0.5rem">⚡ Quick Reference</h4><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:0.5rem">${c.popular.map(([a,b])=>`<div style="background:var(--bg-input);border-radius:8px;padding:0.5rem;font-size:0.78rem"><div style="color:var(--text-muted)">${a}</div><div style="font-weight:700;color:var(--primary)">${b}</div></div>`).join('')}</div>`;
  } else {document.getElementById('quickRef').innerHTML='';}
  convert();
}

function convert(){
  const cat=currentCat;const c=categories[cat];
  const val=+document.getElementById('fromVal').value;
  const from=document.getElementById('fromUnit').value;
  const to=document.getElementById('toUnit').value;
  let result;
  if(cat==='temperature'){
    if(from===to){result=val;}
    else if(from==='Celsius'&&to==='Fahrenheit'){result=val*9/5+32;}
    else if(from==='Celsius'&&to==='Kelvin'){result=val+273.15;}
    else if(from==='Celsius'&&to==='Rankine'){result=(val+273.15)*9/5;}
    else if(from==='Fahrenheit'&&to==='Celsius'){result=(val-32)*5/9;}
    else if(from==='Fahrenheit'&&to==='Kelvin'){result=(val-32)*5/9+273.15;}
    else if(from==='Kelvin'&&to==='Celsius'){result=val-273.15;}
    else if(from==='Kelvin'&&to==='Fahrenheit'){result=(val-273.15)*9/5+32;}
    else{result=val;}
  } else {
    const baseVal=val*c.units[from];result=baseVal/c.units[to];
  }
  const fmtNum=n=>{if(Math.abs(n)>=1e10||Math.abs(n)<0.0001&&n!==0)return n.toExponential(6);return parseFloat(n.toFixed(8)).toString().replace(/\.?0+$/,'');};
  document.getElementById('result').textContent=fmtNum(result)+' '+to;
  document.getElementById('formulaBox').textContent=`${val} ${from} = ${fmtNum(result)} ${to}`;
}

function swapUnits(){
  const f=document.getElementById('fromUnit').value,t=document.getElementById('toUnit').value;
  document.getElementById('fromUnit').value=t;document.getElementById('toUnit').value=f;convert();
}

document.addEventListener('DOMContentLoaded',()=>setCategory('length',null));
</script>
</body>
